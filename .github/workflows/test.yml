name: Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          # The CLI builds against the PUBLISHED SDK (develop tag) in CI, not the
          # local workspace symlink — so SDK changes must be published first.
          npm pkg set dependencies.@inneropen/marvin-sdk="develop"
          npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: |
          npm pack --dry-run
          echo "Package size:"
          du -sh dist/
